<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Wanderlust Travels</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .logo-font { font-family: 'Playfair Display', sans-serif; }
  </style>
</head>
<body class="bg-zinc-900 text-white">

  <!-- Navbar -->
  <nav class="bg-white text-zinc-900 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-sky-600 rounded-2xl flex items-center justify-center text-white text-2xl">✈️</div>
        <span class="logo-font text-3xl font-bold text-sky-700">Wanderlust</span>
      </div>
      <a href="index.html" class="text-sky-600 font-medium">← Back to Home</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-20 grid md:grid-cols-2 gap-16">
    <!-- Left: Form -->
    <div>
      <h1 class="text-5xl font-bold tracking-tighter logo-font mb-6">Let's Plan Your Dream Trip</h1>
      <p class="text-gray-400 text-lg mb-10">Our travel specialists are ready to help you create an unforgettable journey.</p>

      <form id="contact-form" class="space-y-6">
        <div class="grid grid-cols-2 gap-6">
          <input type="text" id="name" placeholder="Your Name" 
                 class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-sky-500">
          <input type="email" id="email" placeholder="Email Address" 
                 class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-sky-500">
        </div>
        <textarea id="message" rows="6" placeholder="Tell us about your dream destination or trip..." 
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-sky-500"></textarea>
        
        <button type="submit" 
                class="w-full bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-semibold text-lg transition">
          Send Message
        </button>
      </form>
    </div>

    <!-- Right: Contact Info -->
    <div class="space-y-12 pt-10">
      <div>
        <h4 class="text-sky-400 font-medium mb-3">Our Office</h4>
        <p class="text-gray-400">Sunyani, Ghana</p>
      </div>
      <div>
        <h4 class="text-sky-400 font-medium mb-3">Call Us</h4>
        <p class="text-gray-400 text-xl">+233 597642507</p>
        <p class="text-gray-400 text-xl">+233 550655696</p>
      </div>
      <div>
        <h4 class="text-sky-400 font-medium mb-3">Email</h4>
        <p class="text-gray-400 text-xl">hello@wanderlustgh.com</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert("✅ Thank you! Your message has been received. We'll reply within 24 hours.");
      this.reset();
    });
  </script>
</body>
</html>
